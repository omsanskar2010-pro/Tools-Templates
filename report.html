<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Report Writing | Tools & Templates</title>

<link rel="icon" type="image/png" href="assets/tt-favicon.png">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364,#6dd5fa);
  color: white;
  text-align: center;
}

header { padding: 15px; }

.logo { width: 120px; }

h1 { color: gold; }

.container { padding: 15px; }

input, textarea {
  width: 90%;
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.generate { background: #00cec9; }
.sample { background: #fdcb6e; }
.reset { background: #d63031; color:white; }
.download { background: #6c5ce7; color:white; }
.print { background: #00b894; color:white; }

/* Output */
.output {
  background: white;
  color: black;
  margin: 20px;
  padding: 25px;
  border-radius: 10px;
  text-align: left;
}

/* Mobile */
@media(max-width:600px){
  input, textarea { width: 95%; }
  .logo { width: 90px; }
}
</style>
</head>

<body>

<header>
  <img src="assets/tt-logo.png" class="logo">
  <h1>Report Writing Tool</h1>
</header>

<div class="container">

<input id="title" placeholder="Report Title">
<input id="name" placeholder="Your Name">
<input id="date" placeholder="Date">
<input id="place" placeholder="Place">

<textarea id="intro" rows="3" placeholder="Introduction"></textarea>
<textarea id="body" rows="4" placeholder="Main Content"></textarea>
<textarea id="conclusion" rows="3" placeholder="Conclusion"></textarea>

<br>

<button class="generate" onclick="generateReport()">Generate</button>
<button class="sample" onclick="fillSample()">Sample</button>
<button class="reset" onclick="resetForm()">Reset</button>

<br>

<button class="download" onclick="downloadTXT()">Download TXT</button>
<button class="print" onclick="printReport()">Print / Save PDF</button>
<button class="download" onclick="sendGmail()">Send via Gmail</button>

</div>

<div id="output" class="output"></div>

<script>

/* Generate */
function generateReport(){
  let title = document.getElementById("title").value;
  let name = document.getElementById("name").value;
  let date = document.getElementById("date").value;
  let place = document.getElementById("place").value;
  let intro = document.getElementById("intro").value;
  let body = document.getElementById("body").value;
  let conclusion = document.getElementById("conclusion").value;

  let report = `
<h2 style="text-align:center">${title}</h2>

<p><b>By:</b> ${name}</p>
<p><b>Date:</b> ${date}</p>
<p><b>Place:</b> ${place}</p>

<br>

<p><b>Introduction:</b><br>${intro}</p>

<br>

<p><b>Main Content:</b><br>${body}</p>

<br>

<p><b>Conclusion:</b><br>${conclusion}</p>
`;

  document.getElementById("output").innerHTML = report;
}

/* Sample */
function fillSample(){
  document.getElementById("title").value = "Cleanliness Drive in School";
  document.getElementById("name").value = "Pragya Sanskriti";
  document.getElementById("date").value = "31 March 2026";
  document.getElementById("place").value = "School Campus";

  document.getElementById("intro").value =
  "A cleanliness drive was organized in our school to promote hygiene awareness.";

  document.getElementById("body").value =
  "Students actively participated in cleaning classrooms and surroundings. Teachers guided us and explained the importance of cleanliness.";

  document.getElementById("conclusion").value =
  "The drive was successful and motivated everyone to maintain cleanliness daily.";
}

/* Reset */
function resetForm(){
  document.getElementById("title").value = "";
  document.getElementById("name").value = "";
  document.getElementById("date").value = "";
  document.getElementById("place").value = "";
  document.getElementById("intro").value = "";
  document.getElementById("body").value = "";
  document.getElementById("conclusion").value = "";
  document.getElementById("output").innerHTML = "";
}

/* TXT */
function downloadTXT(){
  let text = document.getElementById("output").innerText;
  let blob = new Blob([text], {type:"text/plain"});
  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "report.txt";
  link.click();
}

/* Print */
function printReport(){
  let content = document.getElementById("output").innerHTML;

  let win = window.open('', '', 'width=800,height=600');

  win.document.write(`
    <html>
    <head>
    <title>Report</title>
    <style>
      body{font-family:Arial;padding:20px;}
    </style>
    </head>
    <body>${content}</body>
    </html>
  `);

  win.document.close();
  win.print();
}

/* Gmail */
function sendGmail(){
  let content = document.getElementById("output").innerText;

  if(content.trim() === ""){
    alert("Generate report first!");
    return;
  }

  let subject = encodeURIComponent("Report Writing");
  let body = encodeURIComponent(content);

  let url = `https://mail.google.com/mail/?view=cm&fs=1&su=${subject}&body=${body}`;
  window.open(url, "_blank");
}

</script>

</body>
</html>
