<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diary Entry | Tools & Templates</title>

<link rel="icon" type="image/png" href="assets/tt-favicon.png">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364,#6dd5fa);
  color: white;
  text-align: center;
}

header { padding: 15px; }

.logo { width: 120px; }

h1 { color: gold; }

.container { padding: 15px; }

input, textarea {
  width: 90%;
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.generate { background: #00cec9; }
.sample { background: #fdcb6e; }
.reset { background: #d63031; color:white; }
.download { background: #6c5ce7; color:white; }
.print { background: #00b894; color:white; }

/* Output */
.output {
  background: #fff;
  color: #000;
  margin: 20px;
  padding: 25px;
  border-radius: 10px;
  text-align: left;
  font-style: italic;
}

/* Mobile */
@media(max-width:600px){
  input, textarea { width: 95%; }
  .logo { width: 90px; }
}
</style>
</head>

<body>

<header>
  <img src="assets/tt-logo.png" class="logo">
  <h1>Diary Entry</h1>
</header>

<div class="container">

<input id="date" placeholder="Date">
<input id="day" placeholder="Day (e.g., Monday)">
<input id="mood" placeholder="Mood (happy/sad/excited etc.)">

<textarea id="content" rows="6" placeholder="Write your diary here..."></textarea>

<br>

<button class="generate" onclick="generateDiary()">Generate</button>
<button class="sample" onclick="fillSample()">Sample</button>
<button class="reset" onclick="resetForm()">Reset</button>

<br>

<button class="download" onclick="downloadTXT()">Download TXT</button>
<button class="print" onclick="printDiary()">Print / Save PDF</button>
<button class="download" onclick="sendGmail()">Send via Gmail</button>

</div>

<div id="output" class="output"></div>

<script>

/* Generate */
function generateDiary(){
  let date = document.getElementById("date").value;
  let day = document.getElementById("day").value;
  let mood = document.getElementById("mood").value;
  let content = document.getElementById("content").value;

  let diary = `
<p><b>${day}, ${date}</b></p>
<p><b>Mood:</b> ${mood}</p>

<br>

<p>Dear Diary,</p>

<p>${content}</p>

<br>

<p>~ End of Entry</p>
`;

  document.getElementById("output").innerHTML = diary;
}

/* Sample */
function fillSample(){
  document.getElementById("date").value = "31 March 2026";
  document.getElementById("day").value = "Monday";
  document.getElementById("mood").value = "Excited";

  document.getElementById("content").value =
  "Today was a very productive day. I worked on my website project and learned new things. I feel confident and motivated to achieve my goals.";
}

/* Reset */
function resetForm(){
  document.getElementById("date").value = "";
  document.getElementById("day").value = "";
  document.getElementById("mood").value = "";
  document.getElementById("content").value = "";
  document.getElementById("output").innerHTML = "";
}

/* TXT */
function downloadTXT(){
  let text = document.getElementById("output").innerText;
  let blob = new Blob([text], {type:"text/plain"});
  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "diary.txt";
  link.click();
}

/* Print */
function printDiary(){
  let content = document.getElementById("output").innerHTML;

  let win = window.open('', '', 'width=800,height=600');

  win.document.write(`
    <html>
    <head>
    <title>Diary Entry</title>
    <style>
      body{font-family:Arial;padding:20px;font-style:italic;}
    </style>
    </head>
    <body>${content}</body>
    </html>
  `);

  win.document.close();
  win.print();
}

/* Gmail */
function sendGmail(){
  let content = document.getElementById("output").innerText;

  if(content.trim() === ""){
    alert("Write diary first!");
    return;
  }

  let subject = encodeURIComponent("My Diary Entry");
  let body = encodeURIComponent(content);

  let url = `https://mail.google.com/mail/?view=cm&fs=1&su=${subject}&body=${body}`;
  window.open(url, "_blank");
}

</script>

</body>
</html>
