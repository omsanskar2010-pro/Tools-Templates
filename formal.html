<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Formal Letter | Tools & Templates</title>

<!-- Favicon -->
<link rel="icon" type="image/png" href="assets/tt-favicon.png">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364,#6dd5fa);
  color: white;
  text-align: center;
}

header {
  padding: 15px;
}

.logo {
  width: 120px;
}

h1 {
  color: gold;
}

.container {
  padding: 15px;
}

input, textarea {
  width: 90%;
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.generate { background: #00cec9; }
.sample { background: #fdcb6e; }
.reset { background: #d63031; color:white; }
.download { background: #6c5ce7; color:white; }
.print { background: #00b894; color:white; }

/* Output */
.output {
  background: white;
  color: black;
  margin: 20px;
  padding: 20px;
  border-radius: 10px;
  text-align: left;
  white-space: pre-wrap;
}

/* Mobile */
@media(max-width:600px){
  input, textarea { width: 95%; }
  .logo { width: 90px; }
}
</style>
</head>

<body>

<header>
  <img src="assets/tt-logo.png" class="logo">
  <h1>Formal Letter Generator</h1>
</header>

<div class="container">

<input id="to" placeholder="To (Receiver)">
<input id="subject" placeholder="Subject">
<textarea id="body" rows="5" placeholder="Write your letter..."></textarea>

<br>

<button class="generate" onclick="generateLetter()">Generate</button>
<button class="sample" onclick="fillSample()">Sample</button>
<button class="reset" onclick="resetForm()">Reset</button>

<br>

<button class="download" onclick="downloadTXT()">Download TXT</button>
<button class="print" onclick="printLetter()">Print / Save PDF</button>
<button class="download" onclick="sendGmail()">Send via Gmail</button>

</div>

<div id="output" class="output"></div>

<script>

/* Auto Name */
let user = localStorage.getItem("username") || "Your Name";

/* Generate */
function generateLetter(){
  let to = document.getElementById("to").value;
  let subject = document.getElementById("subject").value;
  let body = document.getElementById("body").value;

  let text = 
`To,
${to}

Subject: ${subject}

Respected Sir/Madam,

${body}

Thanking You,
Yours sincerely,
${user}`;

  document.getElementById("output").innerText = text;

  saveHistory(text);
}

/* Sample */
function fillSample(){
  document.getElementById("to").value = "The Principal";
  document.getElementById("subject").value = "Leave Application";
  document.getElementById("body").value = "I am not feeling well, so I request leave for 2 days.";
}

/* Reset */
function resetForm(){
  document.getElementById("to").value = "";
  document.getElementById("subject").value = "";
  document.getElementById("body").value = "";
  document.getElementById("output").innerText = "";
}

/* TXT Download */
function downloadTXT(){
  let text = document.getElementById("output").innerText;
  let blob = new Blob([text], {type: "text/plain"});
  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "formal-letter.txt";
  link.click();
}

/* Print / PDF */
function printLetter(){
  let content = document.getElementById("output").innerHTML;
  let win = window.open('', '', 'width=800,height=600');

  win.document.write(`
    <html>
    <head>
    <title>Print Letter</title>
    <style>
      body { font-family: Arial; padding: 20px; }
    </style>
    </head>
    <body>
      ${content}
    </body>
    </html>
  `);

  win.document.close();
  win.print();
}

/* Gmail (FIXED) */
function sendGmail(){
  let subject = encodeURIComponent(document.getElementById("subject").value);
  let body = encodeURIComponent(document.getElementById("output").innerText);

  window.open(`https://mail.google.com/mail/?view=cm&fs=1&su=${subject}&body=${body}`, "_blank");
}

/* Save History */
function saveHistory(text){
  let history = JSON.parse(localStorage.getItem("history") || "[]");
  history.push(text);
  localStorage.setItem("history", JSON.stringify(history));
}

</script>

</body>
</html>
