<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notice Maker | Tools & Templates</title>

<link rel="icon" type="image/png" href="assets/tt-favicon.png">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364,#6dd5fa);
  color: white;
  text-align: center;
}

header {
  padding: 15px;
}

.logo {
  width: 120px;
}

h1 {
  color: gold;
}

.container {
  padding: 15px;
}

input, textarea {
  width: 90%;
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.generate { background: #00cec9; }
.sample { background: #fdcb6e; }
.reset { background: #d63031; color:white; }
.download { background: #6c5ce7; color:white; }
.print { background: #00b894; color:white; }

/* Output (Notice Format) */
.output {
  background: white;
  color: black;
  margin: 20px;
  padding: 25px;
  border-radius: 10px;
  text-align: left;
  white-space: pre-wrap;
}

/* CENTER PART */
.center {
  text-align: center;
}

/* Mobile */
@media(max-width:600px){
  input, textarea { width: 95%; }
  .logo { width: 90px; }
}
</style>
</head>

<body>

<header>
  <img src="assets/tt-logo.png" class="logo">
  <h1>Notice Maker</h1>
</header>

<div class="container">

<input id="org" placeholder="Organisation Name">
<input id="date" type="date">
<input id="subject" placeholder="Subject">
<textarea id="body" rows="5" placeholder="Write notice content..."></textarea>

<br>

<button class="generate" onclick="generateNotice()">Generate</button>
<button class="sample" onclick="fillSample()">Sample</button>
<button class="reset" onclick="resetForm()">Reset</button>

<br>

<button class="download" onclick="downloadTXT()">Download TXT</button>
<button class="print" onclick="printNotice()">Print / Save PDF</button>
<button class="download" onclick="sendGmail()">Send via Gmail</button>

</div>

<div id="output" class="output"></div>

<script>

/* Auto Date */
window.onload = function(){
  document.getElementById("date").value = new Date().toISOString().split("T")[0];
}

/* Name */
let user = localStorage.getItem("username") || "Your Name";

/* Generate */
function generateNotice(){
  let org = document.getElementById("org").value;
  let date = document.getElementById("date").value;
  let subject = document.getElementById("subject").value;
  let body = document.getElementById("body").value;

  let text = `
<div class="center"><b>${org}</b></div>
<div class="center"><b>NOTICE</b></div>
<div class="center">${subject}</div>

Date: ${date}

${body}

${user}
`;

  document.getElementById("output").innerHTML = text;

  saveHistory(text);
}

/* Sample */
function fillSample(){
  document.getElementById("org").value = "ABC School";
  document.getElementById("subject").value = "Cleanliness Drive";
  document.getElementById("body").value = "All students are informed to participate in cleanliness drive on Monday.";
}

/* Reset */
function resetForm(){
  document.getElementById("org").value = "";
  document.getElementById("subject").value = "";
  document.getElementById("body").value = "";
  document.getElementById("output").innerHTML = "";
}

/* TXT */
function downloadTXT(){
  let text = document.getElementById("output").innerText;
  let blob = new Blob([text], {type:"text/plain"});
  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "notice.txt";
  link.click();
}

/* Print */
function printNotice(){
  let content = document.getElementById("output").innerHTML;
  let win = window.open('', '', 'width=800,height=600');

  win.document.write(`
    <html>
    <head>
    <title>Print Notice</title>
    <style>
      body { font-family: Arial; padding: 20px; }
      .center { text-align: center; }
    </style>
    </head>
    <body>${content}</body>
    </html>
  `);

  win.document.close();
  win.print();
}

/* Gmail */
function sendGmail(){
  let body = encodeURIComponent(document.getElementById("output").innerText);
  window.open(`https://mail.google.com/mail/?view=cm&fs=1&su=Notice&body=${body}`, "_blank");
}

/* History */
function saveHistory(text){
  let history = JSON.parse(localStorage.getItem("history") || "[]");
  history.push(text);
  localStorage.setItem("history", JSON.stringify(history));
}

</script>

</body>
</html>
